  # Content
  eyebrow: Ingeniería de soporte · Creatividad con IA · Desarrollo de apps
  headline: Ingeniero de soporte. Explorador de IA. Creador de apps. Tecnólogo creativo. Ingeniero DevOps.
  intro: Trabajo donde la fiabilidad se encuentra con la imaginación. La ingeniería de soporte mantiene mis sistemas con los pies en la tierra; el trabajo creativo con IA mantiene mis ideas en movimiento. El resultado son herramientas prácticas con un toque cinematográfico.
  creative_brand_pitch: Una firma para visuales creados con IA, experimentos musicales y estudios multimedia moldeados por la precisión, la atmósfera y una rebeldía controlada.
  story_sections:
    - title: Qué es este sitio
      body: Este es mi rincón de internet para proyectos, experimentos, notas y publicaciones ocasionales sobre soporte técnico, herramientas de IA, proyectos de apps, automatización, filosofía, running y la extraña relación entre la creatividad y la depuración.
    - title: Ingeniería de soporte
      body: La tecnología del mundo real no se preocupa por los diagramas perfectos. Las cosas fallan, los usuarios se atascan y los registros solo cuentan parte de la historia. Disfruto encontrando patrones, llegando a la causa raíz, explicando los problemas con claridad y dejando mejor documentación para que la siguiente persona empiece con ventaja.
    - title: IA y experimentos creativos
      body: Uso herramientas de IA de imagen, música y video para llevar las ideas de la imaginación a algo concreto. Los prompts ayudan con la velocidad, pero el gusto, la dirección y la edición siguen importando. La IA es poderosa, pero todavía necesita a una persona que sepa cuándo algo no funciona.
  focus_areas:
    - title: Tecnología × Creatividad
      description: Me interesa sobre todo el cruce donde la experimentación creativa se encuentra con la ingeniería práctica y las ideas se convierten en herramientas reales.
    - title: Creación asistida por IA
      description: Los flujos de trabajo de IA para imagen, música y video me permiten probar conceptos rápido e iterar sobre el estilo, la atmósfera y la dirección.
    - title: Automatización y mentalidad DevOps
      description: Construir es divertido, pero mantener los sistemas sanos es donde ocurre el verdadero aprendizaje. Valoro la repetibilidad, la observabilidad y los valores por defecto útiles.

