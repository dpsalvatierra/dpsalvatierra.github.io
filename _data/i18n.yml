  # Content
  eyebrow: Support engineering · AI creativity · App development
  headline: Support engineer. AI explorer. App builder. Creative technologist. DevOps engineer.
  intro: I work where reliability meets imagination. Support engineering keeps my systems grounded; creative AI work keeps my ideas moving. The result is practical tools with a cinematic edge.
  creative_brand_pitch: A signature for AI-crafted visuals, musical experiments, and multimedia studies shaped by precision, atmosphere, and controlled rebellion.
  story_sections:
    - title: What this site is
      body: This is my corner of the internet for projects, experiments, notes, and the occasional post about technical support, AI tools, app projects, automation, philosophy, running, and the strange relationship between creativity and debugging.
    - title: Support engineering
      body: Real-world technology doesn't care about perfect diagrams. Things break, users get stuck, and logs only tell part of the story. I enjoy spotting patterns, getting to the root cause, explaining issues clearly, and leaving better documentation so the next person starts ahead.
    - title: AI and creative experiments
      body: I use image, music, and video AI tools to move ideas from imagination into something concrete. Prompts help with speed, but taste, direction, and editing still matter. AI is powerful, but it still needs a person who knows when something isn't working.
  focus_areas:
    - title: Technology × Creativity
      description: I'm most interested in the intersection where creative experimentation meets practical engineering and ideas turn into real tools.
    - title: AI-assisted creation
      description: AI workflows for image, music, and video let me test concepts fast and iterate on style, atmosphere, and direction.
    - title: Automation and a DevOps mindset
      description: Building is fun, but keeping systems healthy is where the real learning happens. I value repeatability, observability, and helpful defaults.
